<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musa Gastrobar - Menú Digital</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Iconos rápidos para la interfaz móvil -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Encabezado fijo del local -->
    <header class="main-header">
        <div class="logo">MUSA</div>
        <p class="subtitle">GASTROBAR</p>
    </header>

    <!-- Barra de categorías deslizable horizontalmente (Ideal para dedos) -->
    <nav class="categories-nav" id="categories-nav">
        <!-- Los botones se generarán automáticamente desde JS -->
    </nav>

    <!-- Contenedor principal donde se cargará el menú dinámicamente -->
    <main class="menu-container" id="menu-container">
        <div class="loading">Cargando la experiencia Musa...</div>
    </main>

    <!-- Script lógico -->
    <script src="app.js"></script>
</body>
</html>
